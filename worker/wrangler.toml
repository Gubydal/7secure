name = "7secure-worker"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[triggers]
crons = ["0 7 * * *"]

[observability]
enabled = false

[vars]
# OpenRouter configuration — API key set in Cloudflare Dashboard
LLM_BASE_URL = "https://openrouter.ai/api/v1"
LLM_MODEL = "openai/gpt-oss-120b:free"
BRAVE_SEARCH_COUNTRY = "us"
BRAVE_SEARCH_LANG = "en"
BRAVE_SEARCH_RESULTS_PER_QUERY = "16"
BRAVE_SEARCH_FRESHNESS = "pw"
RESEND_FROM_EMAIL = "7secure <onboarding@resend.dev>"
NEXT_PUBLIC_SITE_URL = "https://7secure.pages.dev"
